[tools]
pre-commit = "latest"

[tasks.default]
description = "Build and switch the current host"
quiet = true
run = "scripts/switch_host.sh"

[tasks.lint]
description = "Auto-fix deadnix, nixpkgs-fmt, and statix issues"
quiet = true
run = [
  "echo \"Auto-fixing nix files...\"",
  "echo \"Running deadnix --edit...\"",
  "nix run nixpkgs#deadnix -- --edit .",
  "echo \"Running nixpkgs-fmt...\"",
  "nix run nixpkgs#nixpkgs-fmt -- .",
  "echo \"Running statix fix...\"",
  "nix run nixpkgs#statix -- fix .",
]

[tasks.check]
description = "Run lint, flake check, and build current host"
quiet = true
depends = ["lint"]
run = '''
echo "Running flake checks and host build for $(hostname -s)..."
nix flake check --all-systems
host="$(hostname -s)"
if [ "$(uname)" = "Darwin" ]; then
  nix build ".#darwinConfigurations.${host}.system"
else
  sudo nixos-rebuild build --flake .
fi
'''
